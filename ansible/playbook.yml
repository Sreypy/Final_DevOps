---
- name: Web Server Deployment Tasks
  hosts: webserver
  become: yes

  tasks:
    # 1. Reset any local changes and git pull
    - name: Reset local changes
      command: git checkout -- .
      args:
        chdir: /app

    - name: Git pull latest code
      command: git pull
      args:
        chdir: /app

    # 2. Build using Maven
    - name: Build with Maven
      command: mvn clean package -DskipTests
      args:
        chdir: /app

    # 3. Run tests against SQLite
    - name: Run tests with SQLite test DB
      command: mvn test -Dspring.profiles.active=test
      args:
        chdir: /app

    # 4. Backup MySQL database
    - name: Backup MySQL database
      command: >
        mysqldump -u root -pHello@123 A_DOEUNG_Sreypy_db
      register: backup_output

    - name: Save backup to file
      copy:
        content: "{{ backup_output.stdout }}"
        dest: /app/backup.sql